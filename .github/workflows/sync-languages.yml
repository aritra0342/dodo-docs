name: Sync Languages

on:
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check for existing PR
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there's an open PR with the title pattern for language sync
          # Search for PRs with title containing "sync language translations" or branch starting with "sync-languages-"
          EXISTING_PR=$(gh pr list --state open --search "sync language translations" --json number,headRefName --jq '.[0].number // empty' || echo "")
          
          # Also check for PRs with branches matching our pattern
          if [ -z "$EXISTING_PR" ] || [ "$EXISTING_PR" == "null" ]; then
            EXISTING_PR=$(gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("sync-languages-")) | .number' | head -n 1 || echo "")
          fi
          
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ] && [ "$EXISTING_PR" != "" ]; then
            echo "existing_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
            echo "Found existing open PR #$EXISTING_PR for language sync. Skipping workflow."
          else
            echo "existing_pr=false" >> $GITHUB_OUTPUT
            echo "No existing PR found. Proceeding with language sync."
          fi

      - name: Run language sync script
        if: steps.check-pr.outputs.existing_pr == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/syncAllLanguages.ts

      - name: Check for changes
        if: steps.check-pr.outputs.existing_pr == 'false'
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected. Will create PR."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected. Skipping PR creation."
          fi

      - name: Configure Git
        if: steps.check-pr.outputs.existing_pr == 'false' && steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create branch and commit changes
        if: steps.check-pr.outputs.existing_pr == 'false' && steps.check-changes.outputs.has_changes == 'true'
        id: create-branch
        run: |
          BRANCH_NAME="sync-languages-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "chore: sync language translations

          Automated language sync from English source files.
          Generated by GitHub Actions workflow."

      - name: Push changes
        if: steps.check-pr.outputs.existing_pr == 'false' && steps.check-changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.create-branch.outputs.branch_name }}"

      - name: Create Pull Request
        if: steps.check-pr.outputs.existing_pr == 'false' && steps.check-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync language translations" \
            --body "This PR contains automated language translation updates.

          ## What changed
          - Updated translations for all target languages from English source files
          - Removed orphaned files that no longer exist in the English version
          - Updated language navigation in docs.json

          ## How to review
          - Review the changes in the language folders
          - Verify that translations are accurate
          - Check that no important content was accidentally removed

          ---
          *This PR was automatically created by the [Sync Languages workflow](.github/workflows/sync-languages.yml)*" \
            --base main \
            --head "${{ steps.create-branch.outputs.branch_name }}"
